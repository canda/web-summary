services:
  api:
    image: node:24.14.1-alpine
    working_dir: /app
    command: sh -lc "npm install && npm run dev"
    ports:
      - "3001:3001"
    volumes:
      - ./server:/app
      - server_node_modules:/app/node_modules
    environment:
      PORT: "3001"
    models:
      llm:
        endpoint_var: AI_MODEL_URL
        model_var: AI_MODEL_NAME
  web:
    image: node:24.14.1-alpine
    working_dir: /app
    command: sh -lc "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    depends_on:
      - api
    volumes:
      - ./web:/app
      - web_node_modules:/app/node_modules

models:
  llm:
    model: ai/gemma4:E2B
    context_size: 8192
    runtime_flags:
      - '--temp'
      - '0.2'

volumes:
  server_node_modules:
  web_node_modules:
